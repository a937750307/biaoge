<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>制表通 - 通用表格生成器</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: '微软雅黑', Arial, sans-serif; background: #f7f8fa; margin: 0; }
    .container { max-width: 1100px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #eee; padding: 32px; }
    .upload-area { border: 2px dashed #b3c6ff; border-radius: 8px; padding: 40px; text-align: center; color: #888; margin-bottom: 24px; background: #f4f7ff; cursor: pointer; }
    .upload-area.dragover { border-color: #409eff; background: #e6f7ff; }
    .table-wrap { overflow-x: auto; }
    .hide-print { display: block; }
    @media print {
      .container, .custom-bar, .actions, .table-wrap, .upload-area, .hide-print { display: none !important; }
      #slipWrap { display: block !important; }
      .single-slip { box-shadow: none; border-radius: 0; page-break-after: always; }
      .cut-line { margin: 12px 0 0 0; }
    }
    .single-slip { width: 100%; max-width: 900px; margin: 0 auto 32px auto; background: #fff; border-radius: 6px; box-shadow: 0 1px 4px #eee; padding: 24px 24px 8px 24px; position: relative; }
    .slip-title { text-align: center; font-size: 22px; font-weight: bold; letter-spacing: 8px; margin-bottom: 12px; }
    .slip-meta { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; color: #444; }
    .slip-table { border-collapse: collapse; width: 100%; margin: 0; table-layout: auto; }
    .slip-table th, .slip-table td {
      border: 1px solid #e0e0e0;
      padding: 8px 12px;
      text-align: center;
      word-break: break-all;
      white-space: pre-line;
      box-sizing: border-box;
    }
    .cut-line { border: none; border-top: 2px dashed #bbb; margin: 24px 0 0 0; height: 0; }
    .custom-bar { margin-bottom: 18px; background: #f7f7fb; padding: 16px 20px; border-radius: 6px; box-shadow: 0 1px 2px #eee; }
    .custom-bar label { margin-right: 10px; font-size: 15px; }
    .custom-bar input { margin-right: 24px; padding: 4px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; }
    @media print {
      .container, .custom-bar, .actions { display: none !important; }
      .single-slip { box-shadow: none; border-radius: 0; page-break-after: always; }
      .cut-line { margin: 12px 0 0 0; }
    }
    th, td {
      border: 1px solid #e0e0e0;
      padding: 8px 12px;
      text-align: center;
      word-break: break-all;
      white-space: pre-line;
      box-sizing: border-box;
    }
    th input { width: 90%; border: 1px solid #d0d0d0; border-radius: 4px; padding: 2px 6px; }
    .actions { margin-top: 20px; }
    .btn { background: #409eff; color: #fff; border: none; border-radius: 4px; padding: 8px 20px; cursor: pointer; margin-right: 10px; }
    .btn:active { background: #3076d1; }
    .search-box { float: right; margin-bottom: 10px; }
    .search-box input { padding: 4px 10px; border: 1px solid #ccc; border-radius: 4px; }
  </style>
</head>
<body>
    <div class="container">
      <h2>制表通 - 通用表格生成器</h2>
      <div class="custom-bar hide-print">
        <label>大标题：<input id="customTitle" value="工资条" /></label>
        <label>公司名称：<input id="customCompany" value="某某科技有限公司" /></label>
        <label>年月：<input id="customDate" value="2026年02月" /></label>
        <br/>
        <label style="display:inline-block;margin-top:8px;">模板显示前几行：<input id="customHeaderRows" type="number" min="1" max="10" value="2" style="width:50px;" /></label>
        <button class="btn" onclick="renderTable()">预览</button>
        <button class="btn" onclick="window.print()">打印全部</button>
      </div>
      <div id="uploadArea" class="upload-area hide-print">
        <div>
          <img src="https://img.icons8.com/color/96/000000/ms-excel.png" alt="excel" width="64" />
          <div style="margin: 12px 0;">
            <button class="btn" onclick="document.getElementById('fileInput').click()">上传文件</button>
          </div>
          <div>或将文件拖拽到此区域<br>（支持 xls、xlsx、csv）</div>
        </div>
        <input type="file" id="fileInput" accept=".xls,.xlsx,.csv" style="display:none" />
      </div>
      <div class="actions hide-print" style="display:none;" id="actionsBar">
        <span class="search-box">
          <input type="text" id="searchInput" placeholder="搜索..." oninput="searchTable()" />
        </span>
      </div>
      <div class="hide-print" style="margin-bottom:10px;">
        <button class="btn" id="toggleTableBtn" onclick="toggleTable()">展开原始表格</button>
      </div>
      <div class="table-wrap hide-print" id="tableWrap" style="display:none;"></div>
      <div id="slipWrap"></div>
    </div>
  <script>
    let tableData = [];
    let tableHeader = [];
    let filteredData = [];
    let fileName = '';
    let merges = [];

    // 展开/收起原始表格
          function toggleTable() {
            const tableDiv = document.getElementById('tableWrap');
            const btn = document.getElementById('toggleTableBtn');
            if (tableDiv.style.display === 'none') {
              tableDiv.style.display = '';
              btn.textContent = '收起原始表格';
            } else {
              tableDiv.style.display = 'none';
              btn.textContent = '展开原始表格';
            }
          }
    // 上传/拖拽
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); });
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => {
      handleFile(e.target.files[0]);
      // 解决连续上传同一文件不触发change的问题
      fileInput.value = '';
    });

    function handleFile(file) {
      if (!file) return;
      fileName = file.name;
      const reader = new FileReader();
      reader.onload = function(e) {
        let data = e.target.result;
        let workbook = XLSX.read(data, { type: 'binary' });
        let sheet = workbook.Sheets[workbook.SheetNames[0]];
        let json = XLSX.utils.sheet_to_json(sheet, { header: 1, blankrows: false });
        if (json.length === 0) return;
        window.lastJsonRaw = json; // 保存原始json用于多行表头
        tableHeader = json[0];
        // 自动忽略空白行
        tableData = json.slice(1).filter(row => Array.isArray(row) && row.some(cell => cell !== undefined && String(cell).trim() !== ''));
        filteredData = tableData;
        merges = (sheet['!merges'] || []).map(m => ({
          s: { r: m.s.r, c: m.s.c },
          e: { r: m.e.r, c: m.e.c }
        }));
        renderTable();
        document.getElementById('actionsBar').style.display = '';
      };
      reader.readAsBinaryString(file);
    }

    // 渲染表格
    function renderTable() {
      // 原始表格区
      // 自动裁剪无内容的尾部空白列
      let data = filteredData.length ? filteredData : tableData;
      let rowCount = data.length;
      let colCount = tableHeader.length;
      // 计算实际有内容的最大列数
      let lastCol = colCount - 1;
      outer: for (; lastCol >= 0; lastCol--) {
        if (tableHeader[lastCol] && String(tableHeader[lastCol]).trim() !== '') break;
        for (let r = 0; r < rowCount; r++) {
          if (data[r][lastCol] !== undefined && String(data[r][lastCol]).trim() !== '') break outer;
        }
      }
      lastCol = Math.max(lastCol, 0);
      colCount = lastCol + 1;
      // 渲染表格
      let html = '<table><thead><tr>';
      for (let i = 0; i < colCount; i++) {
        html += `<th>${tableHeader[i]}</th>`;
      }
      html += '</tr></thead><tbody>';
      const skip = Array.from({ length: rowCount }, () => Array(colCount).fill(false));
      const mergeMap = {};
      merges.forEach(m => {
        if (m.s.c > lastCol) return;
        const key = `${m.s.r - 1},${m.s.c}`;
        let colspan = Math.min(m.e.c, lastCol) - m.s.c + 1;
        if (colspan < 1) return;
        mergeMap[key] = { rowspan: m.e.r - m.s.r + 1, colspan };
        for (let r = m.s.r - 1; r <= m.e.r - 1; r++) {
          for (let c = m.s.c; c <= Math.min(m.e.c, lastCol); c++) {
            if (!(r === m.s.r - 1 && c === m.s.c)) {
              skip[r] && (skip[r][c] = true);
            }
          }
        }
      });
      for (let r = 0; r < rowCount; r++) {
        html += '<tr>';
        for (let c = 0; c < colCount; c++) {
          if (skip[r][c]) continue;
          const key = `${r},${c}`;
          let attrs = '';
          if (mergeMap[key]) {
            if (mergeMap[key].rowspan > 1) attrs += ` rowspan="${mergeMap[key].rowspan}"`;
            if (mergeMap[key].colspan > 1) attrs += ` colspan="${mergeMap[key].colspan}"`;
          }
          const val = data[r][c] !== undefined ? data[r][c] : '';
          html += `<td${attrs} title="${val}">${val}</td>`;
        }
        html += '</tr>';
      }
      html += '</tbody></table>';
      document.getElementById('tableWrap').innerHTML = html;

      // 工资条/成绩单 slip 区
      const title = document.getElementById('customTitle').value;
      const company = document.getElementById('customCompany').value;
      const date = document.getElementById('customDate').value;
      const headerRows = Math.max(1, parseInt(document.getElementById('customHeaderRows').value) || 1);
      // slip区也自动裁剪无内容的尾部空白列
      let slips = '';
      // 取原始json前headerRows行作为表头区
      let jsonHeaderRows = [];
      if (window.lastJsonRaw && Array.isArray(window.lastJsonRaw)) {
        jsonHeaderRows = window.lastJsonRaw.slice(0, headerRows);
      } else {
        // 兼容只上传一次的情况
        jsonHeaderRows = [tableHeader];
      }
      for (let r = headerRows - 1; r < rowCount; r++) {
        slips += `<div class="single-slip">`;
        slips += `<div class="slip-title">${title}</div>`;
        slips += `<div class="slip-meta"><span>${company}</span><span>月份：${date}</span></div>`;
        slips += '<table class="slip-table">';
        // 渲染前N行表头
        for (let h = 0; h < jsonHeaderRows.length; h++) {
          slips += '<thead><tr>';
          for (let i = 0; i < colCount; i++) {
            slips += `<th>${jsonHeaderRows[h][i] !== undefined ? jsonHeaderRows[h][i] : ''}</th>`;
          }
          slips += '</tr></thead>';
        }
        slips += '<tbody><tr>';
        for (let c = 0; c < colCount; c++) {
          // 只处理本行的合并
          let attrs = '';
          merges.forEach(m => {
            if (m.s.r - 1 === r && m.s.c === c && c <= lastCol) {
              const rowspan = m.e.r - m.s.r + 1;
              const colspan = Math.min(m.e.c, lastCol) - m.s.c + 1;
              if (rowspan > 1) attrs += ` rowspan="${rowspan}"`;
              if (colspan > 1) attrs += ` colspan="${colspan}"`;
            }
          });
          // 跳过被合并覆盖的单元格
          let skipCell = false;
          merges.forEach(m => {
            if (!(m.s.r - 1 === r && m.s.c === c) && r >= m.s.r - 1 && r <= m.e.r - 1 && c >= m.s.c && c <= Math.min(m.e.c, lastCol)) {
              skipCell = true;
            }
          });
          if (skipCell) continue;
          const val = data[r][c] !== undefined ? data[r][c] : '';
          slips += `<td${attrs} title="${val}">${val}</td>`;
        }
        slips += '</tr></tbody></table>';
        slips += '<hr class="cut-line" />';
        slips += '</div>';
      }
      document.getElementById('slipWrap').innerHTML = slips;
      // 预览后自动滚动到slip区
      if (slips) {
        setTimeout(() => {
          document.getElementById('slipWrap').scrollIntoView({ behavior: 'smooth' });
        }, 100);
      }
    }

    // 表头不再自定义，无需 editHeader

    // 搜索
    function searchTable() {
      const val = document.getElementById('searchInput').value.trim();
      if (!val) {
        filteredData = tableData;
      } else {
        filteredData = tableData.filter(row => row.some(cell => (cell + '').includes(val)));
      }
      renderTable();
    }

    // 导出
    function exportTable() {
      const ws = XLSX.utils.aoa_to_sheet([tableHeader, ...tableData]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
      XLSX.writeFile(wb, fileName ? '制表通_' + fileName : '制表通导出.xlsx');
    }
  </script>
</body>
</html>
