        <script>
          // 支持点击模板文件直接上传体验
          function uploadTemplateFile(url) {
            fetch(url)
              .then(res => res.blob())
              .then(blob => {
                const fileName = decodeURIComponent(url.split('/').pop());
                const file = new File([blob], fileName, { type: blob.type });
                handleFile(file);
              });
          }
        </script>
